name: Build Windows MSI

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build-msi:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle.kts', '**/libs.versions.toml') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      - name: Write local.properties
        shell: bash
        run: echo "sdk.dir=$ANDROID_SDK_ROOT" >> local.properties

      - name: Build MSI
        shell: bash
        run: ./gradlew :composeApp:packageMsi --no-daemon

      - name: Upload MSI artifact
        uses: actions/upload-artifact@v4
        with:
          name: SiiT-Windows-MSI
          path: composeApp/build/compose/binaries/main/msi/*.msi
          retention-days: 30

      - name: Create Release (on tag)
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: composeApp/build/compose/binaries/main/msi/*.msi
          name: SiiT ${{ github.ref_name }}
          draft: false
          prerelease: false
